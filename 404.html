<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Redirect to Telegram</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #050505;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 400px;
      width: 100%;
      background-color: #111111;
      padding: 40px 32px;
      border-radius: 16px;
      border: 1px solid #222222;
    }

    .icon {
      width: 56px;
      height: 56px;
      margin-bottom: 20px;
      fill: #ffffff;
    }

    .icon-small {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .description {
      font-size: 15px;
      color: #888888;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .vpn-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #777777;
      margin-bottom: 28px;
    }

    .vpn-note svg {
      fill: #555555;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .button {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .button-primary {
      background-color: #E02424;
      color: #ffffff;
    }

    .button-primary:hover {
      background-color: #C81E1E;
    }

    .button-secondary {
      background-color: transparent;
      color: #cccccc;
      border: 1px solid #333333;
    }

    .button-secondary:hover {
      background-color: #1a1a1a;
      color: #ffffff;
      border-color: #555555;
    }

    .username-link {
      font-size: 14px;
      font-weight: 500;
      color: #555555;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .username-link:hover {
      color: #ffffff;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="container">
    <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.06-.2-.06-.06-.16-.04-.23-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
    </svg>

    <h1 class="title" id="title">Запуск бота</h1>
    <p class="description" id="description">Нажмите на кнопку ниже, чтобы продолжить работу в Telegram.</p>

    <div class="vpn-note">
      <svg class="icon-small" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
      </svg>
      <span id="vpn-text">Используйте VPN, если ссылка не открывается</span>
    </div>

    <div class="button-group hidden" id="action-buttons">
      <a href="#" id="tg-btn" class="button button-primary">Открыть Telegram</a>

      <button id="copy-btn" class="button button-secondary">
        <svg class="icon-small" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
        <span id="copy-text">Скопировать ссылку</span>
      </button>
    </div>

    <a href="#" id="tg-username-link" class="username-link hidden"></a>
  </main>

  <script>
    const translations = {
      ru: {
        pageTitle: "Переход в Telegram",
        title: "Запуск бота",
        description: "Нажмите на кнопку ниже, чтобы продолжить работу в Telegram.",
        vpnText: "Используйте VPN, если ссылка не открывается",
        btnOpen: "Открыть Telegram",
        btnCopy: "Скопировать ссылку",
        btnCopied: "Скопировано!",
        errorFetch: "Ошибка загрузки данных конфигурации"
      },
      en: {
        pageTitle: "Redirect to Telegram",
        title: "Launch Bot",
        description: "Click the button below to continue in Telegram.",
        vpnText: "Use a VPN if the link doesn't open",
        btnOpen: "Open Telegram",
        btnCopy: "Copy Link",
        btnCopied: "Copied!",
        errorFetch: "Error loading configuration data"
      }
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const userLang = navigator.language || navigator.userLanguage;
      const lang = userLang.toLowerCase().startsWith('ru') ? 'ru' : 'en';

      document.documentElement.lang = lang;
      document.getElementById("page-title").textContent = translations[lang].pageTitle;
      document.getElementById("title").textContent = translations[lang].title;
      document.getElementById("description").textContent = translations[lang].description;
      document.getElementById("vpn-text").textContent = translations[lang].vpnText;

      const btnOpen = document.getElementById("tg-btn");
      const copyText = document.getElementById("copy-text");

      if (btnOpen) btnOpen.textContent = translations[lang].btnOpen;
      if (copyText) copyText.textContent = translations[lang].btnCopy;

      let BOT_LINK = "";
      let BOT_USERNAME = "";

      try {
        // ЖЕСТКИЙ СБРОС КЭША: Добавлен параметр cache: 'no-store' и уникальный рандомный токен
        const url = `https://raw.githubusercontent.com/ChanMQ/chanmq.github.io/main/config.json?t=${Date.now()}&r=${Math.random()}`;
        const response = await fetch(url, {
          method: 'GET',
          cache: 'no-store', // Указывает браузеру вообще не использовать кэш
          headers: {
            'Cache-Control': 'no-cache',
            'Pragma': 'no-cache'
          }
        });

        if (!response.ok) throw new Error("Network response was not ok");
        const config = await response.json();
        BOT_LINK = config.BOT_LINK;
        BOT_USERNAME = config.BOT_USERNAME;

      } catch (error) {
        console.error("Не удалось загрузить config.json:", error);
        document.getElementById("description").textContent = translations[lang].errorFetch;
        return;
      }

      const path = window.location.pathname.replace(/^\/+/, "");
      const tgLink = path ? `${BOT_LINK}?start=${encodeURIComponent(path)}` : BOT_LINK;

      if (btnOpen) btnOpen.href = tgLink;

      const usernameLink = document.getElementById("tg-username-link");
      if (usernameLink) {
        usernameLink.href = tgLink;
        usernameLink.textContent = `Telegram ${BOT_USERNAME}`;
        usernameLink.classList.remove("hidden");
      }

      const actionButtons = document.getElementById("action-buttons");
      if (actionButtons) {
        actionButtons.classList.remove("hidden");
      }

      const copyBtn = document.getElementById("copy-btn");
      if (copyBtn) {
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(tgLink).then(() => {
            copyText.textContent = translations[lang].btnCopied;
            setTimeout(() => {
              copyText.textContent = translations[lang].btnCopy;
            }, 2000);
          }).catch(err => {
            console.error('Ошибка при копировании: ', err);
          });
        });
      }

      if (window.location.hash) {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
    });
  </script>
</body>
</html>
