    /* Главная карточка */
    .container {
      max-width: 420px;
      width: 100%;
      background-color: #0a0a0a;
      padding: 48px 32px 32px 32px;
      border-radius: 12px;
      border: 1px solid #1f1f1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Легкий синий отблеск границы */
    .container::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      border-radius: 12px;
      border: 1px solid #114477;
      opacity: 0.3;
      z-index: -1;
    }

      width: 100px;
      height: 100px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;

      width: 100%;
      height: 100%;

      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 32px;

      width: 100%;
      margin-bottom: 20px;
    }

    .username-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px; /* Чуть увеличил отступ для самолетика */
      padding: 8px 16px;
      background-color: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      color: #a3a3a3;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .username-link:hover {
      border-color: #24A124;
      color: #ffffff;
      background-color: #081a08;
    }

    .username-link svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    /* Кнопки */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-bottom: 24px;
    }

    .button {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    /* Основная зеленая кнопка */
    .button-primary {
      background-color: #24A124;
      color: #ffffff;
    }

    .button-primary:hover {
      background-color: #1f8a1f;
    }

    /* Вторичная кнопка */
    .button-secondary {
      background-color: transparent;
      color: #a3a3a3;
      border: 1px solid #2a2a2a;
    }

    .button-secondary:hover {
      background-color: #141414;
      color: #ffffff;
      border-color: #3f3f3f;
    }

    .icon-small {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Блок VPN внизу */
    .vpn-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #666666;
      width: 100%;
      padding-top: 24px;
      border-top: 1px solid #1a1a1a;
    }

    .vpn-note svg {
      fill: #555555;
    }

    /* Утилита скрытия элементов до загрузки */
    .hidden {
      display: none !important;

      },
      en: {
        pageTitle: "Redirect to Telegram - Ficus Bot",
        title: "Ficus Bot",
        vpnText: "Use a VPN if the connection fails",
        btnOpen: "Open in Telegram",
        btnCopy: "Copy Link",
        btnCopied: "Copied successfully"
      }
    };

    document.addEventListener("DOMContentLoaded", async () => {
      // 1. Применение локализации
      const userLang = navigator.language || navigator.userLanguage;
      const lang = userLang.toLowerCase().startsWith('ru') ? 'ru' : 'en';

      document.documentElement.lang = lang;
      document.getElementById("page-title").textContent = translations[lang].pageTitle;
      document.getElementById("title").textContent = translations[lang].title;
      document.getElementById("vpn-text").textContent = translations[lang].vpnText;

      const btnOpen = document.getElementById("tg-btn");
      const copyText = document.getElementById("copy-text");

      if (btnOpen) btnOpen.textContent = translations[lang].btnOpen;
      if (copyText) copyText.textContent = translations[lang].btnCopy;

      let BOT_LINK = "";
      let BOT_USERNAME = "";

      // 2. Загрузка конфига
      try {
        const url = `https://raw.githubusercontent.com/ChanMQ/chanmq.github.io/main/config.json?t=${Date.now()}`;
        const response = await fetch(url);

        if (!response.ok) throw new Error("Network response was not ok");
        const config = await response.json();

        BOT_LINK = config.BOT_LINK;
        BOT_USERNAME = config.BOT_USERNAME;

      } catch (error) {
        console.error("Не удалось загрузить config.json:", error);
        return;
      }

      // 3. Формирование финальной ссылки
      const path = window.location.pathname.replace(/^\/+/, "");
      const tgLink = path ? `${BOT_LINK}?start=${encodeURIComponent(path)}` : BOT_LINK;

      // 4. Подстановка ссылок и показ кнопок
      if (btnOpen) btnOpen.href = tgLink;

      const usernameLink = document.getElementById("tg-username-link");
      const usernameText = document.getElementById("username-text");
      const usernameWrapper = document.getElementById("username-wrapper");
      if (usernameLink && usernameText && usernameWrapper) {
        usernameLink.href = tgLink;
        usernameText.textContent = `Telegram ${BOT_USERNAME}`;
        usernameWrapper.classList.remove("hidden");
      }

      const actionButtons = document.getElementById("action-buttons");
      if (actionButtons) {
        actionButtons.classList.remove("hidden");
      }

      // 5. Логика кнопки копирования
      const copyBtn = document.getElementById("copy-btn");
      if (copyBtn) {
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(tgLink).then(() => {
            copyText.textContent = translations[lang].btnCopied;
            setTimeout(() => {
              copyText.textContent = translations[lang].btnCopy;
            }, 2000);
          }).catch(err => {
            console.error('Ошибка при копировании: ', err);
          });
        });
      }

      // 6. Очистка хеша из URL
      if (window.location.hash) {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
    });
  </script>
</body>
</html>
