<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficus Bot</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="preload" href="Art.svg" as="image" type="image/svg+xml">
  <link rel="preload" href="Ellipse-1.webp" as="image" type="image/webp">
  <link rel="preload" href="Ellipse-2.webp" as="image" type="image/webp">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0c0d0c;
      --card-bg: #151715;
      --text-main: #f0fdf4;
      --text-muted: #8e958e;
      --accent-green: #4ade80;
      --error-red: #fb7185;
      --btn-gray: #242824;
      --btn-gray-hover: #303630;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
    }

    .card-group {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* === СЛОИ ДЛЯ АНИМАЦИИ "РАЗЪЕЗДА" === */
    .decor-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      user-select: none;
    }

    .decor-layer-tl { z-index: 1; }
    .decor-layer-br { z-index: 4; }

    .decor-tl-content {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      transform: translate(60px, 60px) scale(0.85);
      transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .decor-br-content {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      transform: translate(-60px, -60px) scale(0.85);
      transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: 0.1s;
    }

    /* Конечное состояние (разъехались) */
    .page-wrapper.state-loaded .decor-tl-content,
    .page-wrapper.state-loaded .decor-br-content {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }

    /* Позиционирование графики */
    .decor-tl-glow {
      position: absolute;
      top: -280px;
      left: -290px;
      width: 600px;
      max-width: none;
      opacity: 0.85;
    }
    .decor-tl-crystal {
      position: absolute;
      top: -80px;
      left: -110px;
      width: 240px;
      max-width: none;
      animation: float 6s ease-in-out infinite;
    }

    .decor-br-glow {
      position: absolute;
      bottom: -110px;
      right: -130px;
      width: 280px;
      max-width: none;
      opacity: 0.9;
    }
    .decor-br-crystal {
      position: absolute;
      bottom: -40px;
      right: -50px;
      width: 120px;
      max-width: none;
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(4deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @media (max-width: 480px) {
      .decor-tl-crystal { width: 180px; top: -60px; left: -70px; }
      .decor-tl-glow { width: 450px; top: -190px; left: -220px; }
      .decor-br-crystal { width: 90px; bottom: -30px; right: -40px; }
      .decor-br-glow { width: 220px; bottom: -90px; right: -100px; }
    }
    /* =========================== */

    .ficus-card {
      width: 100%;
      background-color: var(--card-bg);
      border-radius: 32px;
      padding: 48px 32px 20px 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 3;
    }

    .card-extension {
      width: 100%;
      background-color: #122218;
      color: rgba(74, 222, 128, 0.65);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      text-align: center;
      padding: 40px 24px 20px 24px;
      border-radius: 0 0 32px 32px;
      margin-top: -24px;
      position: relative;
      z-index: 2;
      text-wrap: balance;

      opacity: 0;
      transform: translateY(-40px);
      transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: 0.2s;
    }

    .page-wrapper.state-loaded .card-extension {
      opacity: 1;
      transform: translateY(0);
    }

    .logo-wrapper {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1e291e 0%, #111811 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo-svg {
      width: 32px;
      height: 32px;
      fill: var(--accent-green);
    }

    .title {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.5;
      text-wrap: balance;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .loader-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-green);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

    .progress-track {
      width: 120px;
      height: 3px;
      background: #242824;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      position: absolute;
      width: 40%;
      height: 100%;
      background: var(--accent-green);
      border-radius: 10px;
      animation: shift 1.8s infinite ease-in-out;
    }

    @keyframes shift {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }

    .actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn b {
      font-weight: 700;
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      margin-right: 8px;
      fill: currentColor;
    }

    .btn-main {
      background-color: var(--accent-green);
      color: #052e16;
    }

    .btn-main:hover {
      background-color: #86efac;
    }

    .btn-secondary {
      background-color: var(--btn-gray);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background-color: var(--btn-gray-hover);
    }

    .error-wrapper {
      width: 100%;
    }

    .error-card {
      background-color: rgba(251, 113, 133, 0.06);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .error-title {
      color: var(--error-red);
      font-size: 15px;
      font-weight: 600;
    }

    .error-instruction {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .vpn-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(251, 113, 133, 0.15);
      color: var(--error-red);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
    }

    .vpn-badge svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .update-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .update-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .site-footer {
      max-width: 360px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-muted);
      text-align: center;
      text-wrap: balance;
      z-index: 10;

      /* Анимация проявления футера (сноски про VPN) */
      opacity: 0;
      transform: translateY(-10px);
      transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: 0.3s; /* Появляется самым последним */
    }

    .page-wrapper.state-loaded .site-footer {
      opacity: 0.85; /* Итоговая прозрачность */
      transform: translateY(0);
    }

    @keyframes smoothEnter {
      0% { opacity: 0; transform: translateY(16px) scale(0.97); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes smoothFadeOut {
      0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      100% { opacity: 0; transform: translateY(-10px) scale(0.98); filter: blur(3px); }
    }

    .animate-enter {
      animation: smoothEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .animate-exit {
      animation: smoothFadeOut 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <div class="card-group">

      <div class="decor-layer decor-layer-tl">
        <div class="decor-tl-content">
          <img src="Ellipse-1.webp" class="decor-tl-glow" alt="" />
          <img src="Art.svg" class="decor-tl-crystal" alt="" />
        </div>
      </div>

      <main class="ficus-card">
        <div class="logo-wrapper">
          <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8.13,20C14.34,20 19,15.36 19,9.17C19,8.74 18.97,8.31 18.92,7.9M15.27,12.03C11.21,12.69 8,15.54 6.06,19.21C5.5,17.72 5.15,16.11 5.05,14.5C4.85,11.38 6.44,8.1 8.6,5.85C10.8,3.5 13.71,2.42 15.25,2.42C15.3,2.42 15.33,2.42 15.37,2.42C15.82,2.43 16.17,2.78 16.19,3.23C16.24,4.45 16.03,8.27 15.27,12.03Z"/>
          </svg>
        </div>

        <h1 class="title">Ficus Bot</h1>

        <div id="loading-view" class="loader-container">
          <div class="progress-track">
            <div class="progress-bar"></div>
          </div>

        <div id="success-view" class="actions hidden">

          <a href="#" id="tg-app-link" class="btn btn-main">

            </svg>

            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 22.75C6.07 22.75 1.25 17.93 1.25 12S6.07 1.25 12 1.25 22.75 6.07 22.75 12 17.93 22.75 12 22.75m0-20C6.9 2.75 2.75 6.9 2.75 12S6.9 21.25 12 21.25s9.25-4.15 9.25-9.25S17.1 2.75 12 2.75" fill="currentColor"/>
              <path d="M12 16.75c-2.62 0-4.75-2.13-4.75-4.75S9.38 7.25 12 7.25s4.75 2.13 4.75 4.75-2.13 4.75-4.75 4.75m0-8c-1.79 0-3.25 1.46-3.25 3.25s1.46 3.25 3.25 3.25 3.25-1.46 3.25-3.25S13.79 8.75 12 8.75" fill="currentColor"/>
              <path d="M21.17 8.75c-.05 0-.11-.01-.16-.02-2.94-.64-5.91-.64-8.85 0-.41.09-.8-.17-.89-.57-.09-.41.17-.8.57-.89 3.15-.69 6.34-.69 9.49 0 .4.09.66.49.57.89a.74.74 0 0 1-.73.59m-12.63 6c-.21 0-.42-.09-.57-.26a24.8 24.8 0 0 1-4.71-8.12l.69-.31.71-.24.02.06a23.2 23.2 0 0 0 4.43 7.63c.27.31.24.79-.07 1.06-.15.12-.33.18-.5.18m2.34 7.94a.746.746 0 0 1-.55-1.25c2-2.2 3.48-4.75 4.4-7.58.13-.39.57-.65.96-.52s.62.51.5.9c-1.01 3.12-2.6 5.86-4.74 8.22-.16.15-.37.23-.57.23" fill="currentColor"/>

          <div id="update-info" class="update-info">

        <div id="error-view" class="error-wrapper hidden">
          <div class="error-card">
            <span class="error-title" id="txt-err-title"></span>
            <p class="error-instruction" id="txt-err-desc"></p>
            <div class="vpn-badge">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

      </main>

      <div class="card-extension">
        <span id="txt-footer"></span>
      </div>

      <div class="decor-layer decor-layer-br">
        <div class="decor-br-content">
          <img src="Ellipse-2.webp" class="decor-br-glow" alt="" />
          <img src="Art.svg" class="decor-br-crystal" alt="" />
        </div>
      </div>

    </div>

    <footer class="site-footer">
      <span id="txt-vpn-disclaimer"></span>
    </footer>
  </div>

  <script>
    const translations = {
      ru: {
        init: "Инициализация соединения...",
        loading: "ПОЛУЧАЕМ АКТУАЛЬНУЮ ССЫЛКУ",
        ready: "Готов к переходу в ",
        botLabel: "Telegram Бот",
        openApp: "Открыть в <b>Telegram</b>*",
        openWeb: "Открыть в <b>браузере</b>",
        copy: "Копировать ссылку",
        copied: "Ссылка в буфере",
        updatePrefix: "Ссылка обновлена ",
        recently: "недавно",
        footerText: "Ficus Bot — официальная страница. При блокировке новая ссылка всегда публикуется&nbsp;здесь.",
        vpnDisclaimer: "* Для работы Telegram может понадобиться&nbsp;VPN",
        errTitle: "Ошибка доступа",
        errDesc: "Не удалось получить ссылку на бота.<br>Запрос заблокирован провайдером.",
        vpn: "Пожалуйста, включите VPN",
        retry: "Повторить попытку",
        connErr: "Соединение прервано"
      },
      en: {
        init: "Initializing connection...",
        loading: "FETCHING CURRENT LINK",
        ready: "Ready to redirect to ",
        botLabel: "Telegram Bot",
        openApp: "Open in <b>Telegram</b>*",
        openWeb: "Open in <b>Browser</b>",
        copy: "Copy Link",
        copied: "Link copied",
        updatePrefix: "Link updated ",
        recently: "recently",
        footerText: "Ficus Bot official page. If the link is blocked, a new one is always published&nbsp;here.",
        vpnDisclaimer: "* Telegram may require a VPN to work&nbsp;properly",
        errTitle: "Access Denied",
        errDesc: "Could not retrieve the bot link.<br>Request blocked by provider.",
        vpn: "Please, turn on VPN",
        retry: "Try Again",
        connErr: "Connection lost"
      }
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const userLangCode = (navigator.language || "ru").toLowerCase().slice(0, 2);
      const cisLanguages = ['ru', 'uk', 'be', 'kk', 'uz', 'ky', 'tg', 'tk', 'hy', 'az', 'mo'];
      const lang = cisLanguages.includes(userLangCode) ? 'ru' : 'en';
      const t = translations[lang];

      function getRelativeTimeString(dateString, lang) {
        const date = new Date(dateString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.round(diffMs / 60000);
        const diffHours = Math.floor(diffMins / 60);

        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        const isYesterday = yesterday.toDateString() === date.toDateString();

        const formatTime = (d) => d.toLocaleTimeString(lang, { hour: '2-digit', minute: '2-digit' });
        const formatDate = (d) => d.toLocaleDateString(lang, { day: '2-digit', month: '2-digit' });

        if (lang === 'ru') {
          if (diffMins < 1) return 'только что';
          if (diffMins < 60) return `${diffMins} мин. назад`;

          const lastDigit = diffHours % 10;
          const lastTwoDigits = diffHours % 100;
          let hoursStr = 'часов';
          if (lastTwoDigits < 11 || lastTwoDigits > 14) {
            if (lastDigit === 1) hoursStr = 'час';
            else if ([2, 3, 4].includes(lastDigit)) hoursStr = 'часа';
          }

          if (diffHours < 24 && !isYesterday) return `${diffHours} ${hoursStr} назад`;
          if (isYesterday) return `вчера в ${formatTime(date)} (UTC+3)`;
          return `${formatDate(date)} в ${formatTime(date)} (UTC+3)`;
        } else {
          if (diffMins < 1) return 'just now';
          if (diffMins < 60) return `${diffMins} mins ago`;
          if (diffHours === 1) return `1 hour ago`;
          if (diffHours < 24 && !isYesterday) return `${diffHours} hours ago`;
          if (isYesterday) return `yesterday at ${formatTime(date)} (UTC+3)`;
          return `${formatDate(date)} at ${formatTime(date)} (UTC+3)`;
        }
      }

      document.documentElement.lang = lang;
      document.getElementById("dynamic-status").textContent = t.init;
      document.getElementById("txt-loading").textContent = t.loading;
      document.getElementById("tg-app-label").innerHTML = t.openApp;
      document.getElementById("tg-web-label").innerHTML = t.openWeb;
      document.getElementById("copy-label").textContent = t.copy;
      document.getElementById("txt-err-title").textContent = t.errTitle;
      document.getElementById("txt-err-desc").innerHTML = t.errDesc;
      document.getElementById("txt-vpn").textContent = t.vpn;
      document.getElementById("btn-retry").textContent = t.retry;
      document.getElementById("txt-footer").innerHTML = t.footerText;
      document.getElementById("txt-vpn-disclaimer").innerHTML = t.vpnDisclaimer;

      const views = {
        loading: document.getElementById("loading-view"),
        success: document.getElementById("success-view"),
        error: document.getElementById("error-view")
      };

      // Плавная смена экранов и запуск анимации разъезда
      function transitionTo(viewElement) {
        views.loading.classList.add("animate-exit");
        setTimeout(() => {
          views.loading.classList.add("hidden");
          views.loading.classList.remove("animate-exit");

          viewElement.classList.remove("hidden");
          viewElement.classList.add("animate-enter");

          // Запускаем вылет кристаллов, нижнего блока и футера со сноской VPN (WOW-эффект)
          document.querySelector('.page-wrapper').classList.add('state-loaded');
        }, 350);
      }

      try {
        const fetchStartTime = Date.now();
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 7000);
        const configUrl = `https://raw.githubusercontent.com/ChanMQ/chanmq.github.io/main/config.json?t=${Date.now()}`;

        const response = await fetch(configUrl, { signal: controller.signal });
        clearTimeout(timeout);

        if (!response.ok) throw new Error("Config fetch failed");

        const lastModified = response.headers.get('Last-Modified');
        const config = await response.json();

        const pathPart = window.location.pathname.replace(/^\/+/, "");
        const startParamApp = pathPart ? `&start=${encodeURIComponent(pathPart)}` : "";
        const botUsernameRaw = config.BOT_USERNAME.replace('@', '');

        const appUrl = `tg://resolve?domain=${botUsernameRaw}${startParamApp}`;
        const webUrl = pathPart ? `${config.BOT_LINK}?start=${encodeURIComponent(pathPart)}` : config.BOT_LINK;

        document.getElementById("tg-app-link").href = appUrl;
        document.getElementById("tg-web-link").href = webUrl;
        document.getElementById("dynamic-status").textContent = `${t.ready}${t.botLabel} ${config.BOT_USERNAME}`;

        if (config.UPDATED_AT) {
          const timeString = getRelativeTimeString(config.UPDATED_AT, lang);
          document.getElementById("txt-updated").textContent = t.updatePrefix + timeString;
        } else if (lastModified) {
          const timeString = getRelativeTimeString(lastModified, lang);
          document.getElementById("txt-updated").textContent = t.updatePrefix + timeString;
        } else {
          document.getElementById("txt-updated").textContent = t.updatePrefix + t.recently;
        }

        document.getElementById("copy-link").addEventListener("click", () => {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(webUrl).then(() => {
              const label = document.getElementById("copy-label");
              const iconCopy = document.getElementById("icon-copy");
              const iconCheck = document.getElementById("icon-check");

              label.textContent = t.copied;
              iconCopy.classList.add("hidden");
              iconCheck.classList.remove("hidden");

              setTimeout(() => {
                label.textContent = t.copy;
                iconCheck.classList.add("hidden");
                iconCopy.classList.remove("hidden");
              }, 2000);

            }).catch(err => {
              console.error("Clipboard copy failed:", err);
            });
          } else {
            console.warn("Clipboard API not supported in this environment");
          }
        });

        const elapsed = Date.now() - fetchStartTime;
        const minLoadingTime = 1200;
        if (elapsed < minLoadingTime) {
          await new Promise(resolve => setTimeout(resolve, minLoadingTime - elapsed));
        }

        transitionTo(views.success);

      } catch (err) {
        document.getElementById("dynamic-status").textContent = t.connErr;
        transitionTo(views.error);
      }

      if (window.location.hash) {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
    });
  </script>
</body>
</html>
