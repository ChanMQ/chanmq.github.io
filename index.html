<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficus Bot</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0c0d0c;
      --card-bg: #151715;
      --text-main: #f0fdf4;
      --text-muted: #8e958e;
      --accent-green: #4ade80;
      --error-red: #fb7185;
      --btn-gray: #242824;
      --btn-gray-hover: #303630;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .ficus-card {
      width: 100%;
      max-width: 380px;
      background-color: var(--card-bg);
      border-radius: 32px;
      padding: 48px 32px 20px 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-wrapper {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1e291e 0%, #111811 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo-svg {
      width: 32px;
      height: 32px;
      fill: var(--accent-green);
    }

    .title {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .loader-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-green);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

    .progress-track {
      width: 120px;
      height: 3px;
      background: #242824;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      position: absolute;
      width: 40%;
      height: 100%;
      background: var(--accent-green);
      border-radius: 10px;
      animation: shift 1.8s infinite ease-in-out;
    }

    @keyframes shift {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }

    .actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-main {
      background-color: var(--accent-green);
      color: #052e16;
    }

    .btn-main:hover {
      background-color: #86efac;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: var(--btn-gray);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background-color: var(--btn-gray-hover);
      transform: translateY(-1px);
    }

    .error-wrapper {
      width: 100%;
    }

    .error-card {
      background-color: rgba(251, 113, 133, 0.06);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .error-title {
      color: var(--error-red);
      font-size: 15px;
      font-weight: 600;
    }

    .error-instruction {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .vpn-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(251, 113, 133, 0.15);
      color: var(--error-red);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
    }

    .vpn-badge svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .update-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .update-icon {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .hidden {
      display: none !important;
    }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <main class="ficus-card">
    <div class="logo-wrapper">
      <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8.13,20C14.34,20 19,15.36 19,9.17C19,8.74 18.97,8.31 18.92,7.9M15.27,12.03C11.21,12.69 8,15.54 6.06,19.21C5.5,17.72 5.15,16.11 5.05,14.5C4.85,11.38 6.44,8.1 8.6,5.85C10.8,3.5 13.71,2.42 15.25,2.42C15.3,2.42 15.33,2.42 15.37,2.42C15.82,2.43 16.17,2.78 16.19,3.23C16.24,4.45 16.03,8.27 15.27,12.03Z"/>
      </svg>
    </div>

    <h1 class="title">Ficus Bot</h1>
    <p class="subtitle" id="dynamic-status"></p>

    <div id="loading-view" class="loader-container">
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <span class="loader-text" id="txt-loading"></span>
    </div>

    <div id="success-view" class="actions hidden fade-in">
      <a href="#" id="tg-link" class="btn btn-main"></a>
      <button id="copy-link" class="btn btn-secondary">
        <span id="copy-label"></span>
      </button>
      <div id="update-info" class="update-info hidden">
          <svg class="update-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2A10 10 0 1 0 22 12A10 10 0 0 0 12 2Zm0 18A8 8 0 1 1 20 12A8 8 0 0 1 12 20Z" opacity="0.3"/>
            <path d="M12 6A1 1 0 0 0 11 7V12.41L8.29 15.12A1 1 0 1 0 9.71 16.54L13.12 13.12A1 1 0 0 0 13.41 12.41V7A1 1 0 0 0 12 6Z"/>
          </svg>
          <span id="txt-updated"></span>
      </div>
    </div>

    <div id="error-view" class="error-wrapper hidden fade-in">
      <div class="error-card">
        <span class="error-title" id="txt-err-title"></span>
        <p class="error-instruction" id="txt-err-desc"></p>
        <div class="vpn-badge">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
          </svg>
          <span id="txt-vpn"></span>
        </div>
      </div>
      <button id="btn-retry" class="btn btn-secondary" onclick="window.location.reload()"></button>
    </div>
  </main>

  <script>
    const translations = {
      ru: {
        init: "Инициализация соединения...",
        loading: "ПОЛУЧАЕМ АКТУАЛЬНУЮ ССЫЛКУ",
        ready: "Готов к переходу в ",
        botLabel: "Telegram Бот",
        open: "Открыть в Telegram",
        copy: "Копировать ссылку",
        copied: "Ссылка в буфере",
        updatePrefix: "Ссылка обновлена ",
        errTitle: "Ошибка доступа",
        errDesc: "Не удалось получить ссылку на бота.<br>Запрос заблокирован провайдером.",
        vpn: "Пожалуйста, включите VPN",
        retry: "Повторить попытку",
        connErr: "Соединение прервано"
      },
      en: {
        init: "Initializing connection...",
        loading: "FETCHING CURRENT LINK",
        ready: "Ready to redirect to ",
        botLabel: "Telegram Bot",
        open: "Open in Telegram",
        copy: "Copy Link",
        copied: "Link copied",
        updatePrefix: "Link updated ",
        errTitle: "Access Denied",
        errDesc: "Could not retrieve the bot link.<br>Request blocked by provider.",
        vpn: "Please, turn on VPN",
        retry: "Try Again",
        connErr: "Connection lost"
      }
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const userLangCode = (navigator.language || "ru").toLowerCase().slice(0, 2);
      const cisLanguages = ['ru', 'uk', 'be', 'kk', 'uz', 'ky', 'tg', 'tk', 'hy', 'az', 'mo'];
      const lang = cisLanguages.includes(userLangCode) ? 'ru' : 'en';
      const t = translations[lang];

      function getRelativeTimeString(dateString, lang) {
        const date = new Date(dateString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.round(diffMs / 60000);
        const diffHours = Math.floor(diffMins / 60);

        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        const isYesterday = yesterday.toDateString() === date.toDateString();

        const formatTime = (d) => d.toLocaleTimeString(lang, { hour: '2-digit', minute: '2-digit' });
        const formatDate = (d) => d.toLocaleDateString(lang, { day: '2-digit', month: '2-digit' });

        if (lang === 'ru') {
          if (diffMins < 1) return 'только что';
          if (diffMins < 60) return `${diffMins} мин. назад`;

          const lastDigit = diffHours % 10;
          const lastTwoDigits = diffHours % 100;
          let hoursStr = 'часов';
          if (lastTwoDigits < 11 || lastTwoDigits > 14) {
            if (lastDigit === 1) hoursStr = 'час';
            else if ([2, 3, 4].includes(lastDigit)) hoursStr = 'часа';
          }

          if (diffHours < 24 && !isYesterday) return `${diffHours} ${hoursStr} назад`;
          if (isYesterday) return `вчера в ${formatTime(date)}`;
          return `${formatDate(date)} в ${formatTime(date)}`;
        } else {
          if (diffMins < 1) return 'just now';
          if (diffMins < 60) return `${diffMins} mins ago`;
          if (diffHours === 1) return `1 hour ago`;
          if (diffHours < 24 && !isYesterday) return `${diffHours} hours ago`;
          if (isYesterday) return `yesterday at ${formatTime(date)}`;
          return `${formatDate(date)} at ${formatTime(date)}`;
        }
      }

      document.documentElement.lang = lang;
      document.getElementById("dynamic-status").textContent = t.init;
      document.getElementById("txt-loading").textContent = t.loading;
      document.getElementById("tg-link").textContent = t.open;
      document.getElementById("copy-label").textContent = t.copy;
      document.getElementById("txt-err-title").textContent = t.errTitle;
      document.getElementById("txt-err-desc").innerHTML = t.errDesc;
      document.getElementById("txt-vpn").textContent = t.vpn;
      document.getElementById("btn-retry").textContent = t.retry;

      const views = {
        loading: document.getElementById("loading-view"),
        success: document.getElementById("success-view"),
        error: document.getElementById("error-view")
      };

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 7000);
        const configUrl = `https://raw.githubusercontent.com/ChanMQ/chanmq.github.io/main/config.json?t=${Date.now()}`;
        const response = await fetch(configUrl, { signal: controller.signal });
        clearTimeout(timeout);

        if (!response.ok) throw new Error("Config fetch failed");
        const config = await response.json();

        const pathPart = window.location.pathname.replace(/^\/+/, "");
        const finalUrl = pathPart ? `${config.BOT_LINK}?start=${encodeURIComponent(pathPart)}` : config.BOT_LINK;

        document.getElementById("tg-link").href = finalUrl;
        document.getElementById("dynamic-status").textContent = `${t.ready}${t.botLabel} ${config.BOT_USERNAME}`;

        views.loading.classList.add("hidden");
        views.success.classList.remove("hidden");

        // Fetching GitHub commit history for config.json
        try {
          const apiController = new AbortController();
          const apiTimeout = setTimeout(() => apiController.abort(), 3000);

          const commitUrl = 'https://api.github.com/repos/ChanMQ/chanmq.github.io/commits?path=config.json&page=1&per_page=1';
          const commitRes = await fetch(commitUrl, { signal: apiController.signal });
          clearTimeout(apiTimeout);

          if (commitRes.ok) {
            const commitData = await commitRes.json();
            if (commitData && commitData.length > 0) {
              const commitDate = commitData[0].commit.committer.date;
              const timeString = getRelativeTimeString(commitDate, lang);

              document.getElementById("txt-updated").textContent = t.updatePrefix + timeString;
              const updateInfoBlock = document.getElementById("update-info");
              updateInfoBlock.classList.remove("hidden");
              updateInfoBlock.classList.add("fade-in");
            }
          }
        } catch (apiErr) {
          console.warn("Не удалось получить дату обновления через API GitHub:", apiErr);
        }

        // Setup Copy to Clipboard functionality
        document.getElementById("copy-link").addEventListener("click", () => {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(finalUrl).then(() => {
              const label = document.getElementById("copy-label");
              label.textContent = t.copied;
              setTimeout(() => { label.textContent = t.copy; }, 2000);
            }).catch(err => {
              console.error("Clipboard copy failed:", err);
            });
          } else {
            console.warn("Clipboard API not supported in this environment");
          }
        });

      } catch (err) {
        document.getElementById("dynamic-status").textContent = t.connErr;
        views.loading.classList.add("hidden");
        views.error.classList.remove("hidden");
      }

      // Cleanup hash from URL if present
      if (window.location.hash) {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
    });
  </script>
</body>
</html>
