<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Redirect to Telegram</title>
  <script>
    const path = window.location.pathname.replace(/^\/+/, "");

    const botLink = "https://t.me/bxqw_FicusBot";

    const tgLink = path ? `${botLink}?start=${encodeURIComponent(path)}` : botLink;

    if (window.location.hash) {
      history.replaceState(null, "", window.location.pathname + window.location.search);
    }

    window.location.href = tgLink;
  </script>
</head>
<body>
  <p>Перенаправление в Telegram...</p>
</body>
</html>
